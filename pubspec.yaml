name: shadow_diary_mobile
description: "ShadowDiary (影迹) Android client."
publish_to: 'none'
version: 0.0.1+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  bonsoir: ^7.1.4
  dynamic_color: ^1.7.0
  easy_date_timeline: ^2.0.9
  flutter_image_compress: ^2.4.0
  flutter_quill: ^11.5.0
  flutter_quill_delta_from_html: ^1.5.3
  flutter_riverpod: ^3.3.2
  flutter_slidable: ^4.0.3
  flutter_staggered_grid_view: ^0.7.0
  go_router: ^17.3.0
  intl: ^0.20.2
  image_picker: ^1.1.2
  ionicons_flutter: ^1.0.0
  local_auth: ^3.0.2
  lpinyin: ^2.0.3
  path: ^1.9.1
  path_provider: ^2.1.6
  photo_view: ^0.15.0
  sqflite: ^2.4.3
  sqflite_common_ffi: ^2.4.2
  table_calendar: ^3.2.0
  uuid: ^4.6.0
  vsc_quill_delta_to_html: ^1.0.5
  web_socket_channel: ^3.0.3
  wheel_slider: ^1.2.0

dev_dependencies:
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  generate: true
  uses-material-design: true

flutter_launcher_icons:
  android: true
  image_path: resource/icon.png
  min_sdk_android: 24
